name: Code Quality

on:
  pull_request:
    branches: [main]

# 注意：由 peter-evans/create-pull-request 使用 GITHUB_TOKEN 创建的 PR
# 不会触发此 workflow（GitHub 安全策略）。
# 自动博客的质量检查已内置在 daily-blog.yml 中，此处仅覆盖手动创建的 PR。

jobs:
  quality-check:
    name: Lint & Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Build verification
        run: npm run build

      - name: Check for console.log in components
        run: |
          FOUND=$(grep -rn "console\.log" app/ components/ lib/ --include="*.ts" --include="*.tsx" || true)
          if [ -n "$FOUND" ]; then
            echo "::warning::Found console.log statements:"
            echo "$FOUND"
          fi

      - name: Check file size limits
        run: |
          LARGE=$(find app/ components/ lib/ -name "*.ts" -o -name "*.tsx" | xargs wc -l 2>/dev/null | awk '$1 > 400 && !/total/ {print}' || true)
          if [ -n "$LARGE" ]; then
            echo "::warning::Files exceeding 400 lines:"
            echo "$LARGE"
          fi

  content-consistency:
    name: Content Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check blog content changed
        id: blog-changed
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- content/blog/ || true)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No blog content changes detected"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Blog files changed:"
            echo "$CHANGED"
          fi

      - name: Content consistency check
        if: steps.blog-changed.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/check_content_consistency.py --diff-base origin/main

      - name: Skip notice
        if: steps.blog-changed.outputs.skip == 'true'
        run: echo "ℹ️ 本次 PR 未变更博客内容，跳过一致性检查"
